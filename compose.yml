version: "3.9"

services:
  app:
    build: .
    container_name: restaurante_app
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: gestao_restaurante
      NODE_ENV: production
    depends_on:
      - db
    restart: always

  db:
    image: mysql:8
    container_name: restaurante_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestao_restaurante
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: always

volumes:
  db_data:
